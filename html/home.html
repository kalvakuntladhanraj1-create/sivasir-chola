<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Document Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #eef2f7, #f9fbfd);
}

.container {
    max-width: 700px;
    margin: 80px auto;
    text-align: center;
}

h1 {
    margin-bottom: 10px;
    color: #222;
}

p {
    color: #666;
    margin-bottom: 30px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: #ffffff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.08);
    text-decoration: none;
    color: #222;
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.12);
}

.card h3 {
    margin-bottom: 10px;
}

.card p {
    font-size: 14px;
    color: #777;
}
</style></head><body><div class="container"><h1>Document Generator</h1>
<p>Select the type of report you want to generate</p><div class="cards"><a href="/sale" class="card">
<h3>Sale Report</h3>
<p>Generate legal report for sale property</p>
</a><a href="/gift" class="card">
<h3>Gift Report</h3>
<p>Generate legal report for gift deed</p>
</a></div></div></body>
</html>
